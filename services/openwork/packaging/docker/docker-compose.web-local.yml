services:
  mysql:
    image: mysql:8.4
    container_name: ccag-web-local-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ccag_den
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ppassword --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - ccag-web-local-mysql-data:/var/lib/mysql

volumes:
  ccag-web-local-mysql-data:
