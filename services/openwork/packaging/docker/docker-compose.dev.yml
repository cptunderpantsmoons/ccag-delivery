# docker-compose.dev.yml — Dev testability stack (no custom Dockerfile)
#
# Usage (from repo root):
#   docker compose -f packaging/docker/docker-compose.dev.yml up
#
# Then open the printed Web UI URL — already wired to headless, no config needed.
#
# Env overrides (optional, via .env or export):
#   CCAG_TOKEN        — shared client token (auto-generated if unset)
#   CCAG_HOST_TOKEN   — host/admin token (auto-generated if unset)
#   CCAG_WORKSPACE    — host path to mount as workspace (default: ./workspace)
#   CCAG_PORT         — host port to map to container :8787 (default: 8787)
#   WEB_PORT              — host port to map to container :5173 (default: 5173)
#   SHARE_PORT            — host port to map to the share service :3000 (default: 3006)
#   CCAG_DEV_ID       — unique ID for this stack (default: default)
#   CCAG_DEV_MODE     — enables isolated OpenCode dev state (set by dev-up.sh)
#   CCAG_PUBLIC_HOST  — browser-facing host/IP for LAN-accessible URLs (set by dev-up.sh)
#   CCAG_DOCKER_DEV_MOUNT_HOST_OPENCODE=1 — import host OpenCode config/auth into the isolated dev state
#   CCAG_OPENCODE_CONFIG_DIR      — host OpenCode config dir detection override (read by dev-up.sh)
#   CCAG_OPENCODE_DATA_DIR        — host OpenCode data dir detection override (read by dev-up.sh)
#   CCAG_HOST_OPENCODE_CONFIG_DIR — import source for OpenCode config (set by dev-up.sh)
#   CCAG_HOST_OPENCODE_DATA_DIR   — import source for OpenCode auth/data (set by dev-up.sh)

x-shared: &shared
  image: node:22-bookworm-slim
  working_dir: /app
  volumes:
    # Mount the entire repo so both services share node_modules + source
    - ../../:/app
    - pnpm-store:/root/.local/share/pnpm/store
    - bun-install:/root/.bun
    - ${CCAG_WORKSPACE:-./workspace}:/workspace
    - ${CCAG_HOST_OPENCODE_CONFIG_DIR:-./workspace/.ccag-host-opencode-config}:/persist/.config/opencode:ro
    - ${CCAG_HOST_OPENCODE_DATA_DIR:-./workspace/.ccag-host-opencode-data}:/persist/.ccag-host-opencode-data:ro

services:
  orchestrator:
    <<: *shared
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        # --- Ensure workspace dir is writable ---
        mkdir -p /workspace && touch /workspace/.keep 2>/dev/null || true

        # --- Install system deps ---
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates unzip git >/dev/null 2>&1

        # --- Install bun (cached in named volume) ---
        export BUN_INSTALL="/root/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        if ! command -v bun >/dev/null 2>&1; then
          echo "[orchestrator] Installing bun..."
          curl -fsSL https://bun.sh/install | bash
        fi

        # --- Enable pnpm via corepack ---
        corepack enable && corepack prepare pnpm@10.27.0 --activate

        # --- Install deps ---
        echo "[orchestrator] Installing dependencies..."
        pnpm install --no-frozen-lockfile --network-concurrency 1 --child-concurrency 1

        # --- Use source entrypoints for the dev stack ---
        # The orchestrator can spawn .ts files via Bun directly, which avoids bind-mount
        # issues from bun --compile inside Docker on macOS.
        export CCAG_SERVER_BIN="/app/apps/server/src/cli.ts"
        export OPENCODE_ROUTER_BIN="/app/apps/opencode-router/src/cli.ts"

        # --- Resolve tokens ---
        if [ -z "$$CCAG_TOKEN" ]; then
          CCAG_TOKEN=$$(cat /proc/sys/kernel/random/uuid)
          export CCAG_TOKEN
        fi
        if [ -z "$$CCAG_HOST_TOKEN" ]; then
          CCAG_HOST_TOKEN=$$(cat /proc/sys/kernel/random/uuid)
          export CCAG_HOST_TOKEN
        fi

        # Write tokens so the web service can source them
        mkdir -p /app/tmp
        printf 'CCAG_TOKEN=%s\nCCAG_HOST_TOKEN=%s\n' \
          "$$CCAG_TOKEN" "$$CCAG_HOST_TOKEN" > "/app/tmp/.dev-env-${CCAG_DEV_ID:-default}"

        echo ""
        echo "============================================"
        echo "  CCAG orchestrator"
        echo "  Server:     http://localhost:${CCAG_PORT:-8787}"
        echo "  Health:     http://localhost:${CCAG_PORT:-8787}/health"
        echo "  Token:      $$CCAG_TOKEN"
        echo "  Host token: $$CCAG_HOST_TOKEN"
        echo "============================================"
        echo ""

        exec pnpm --filter ccag-orchestrator dev -- start \
          --workspace /workspace \
          --remote-access \
          --ccag-port 8787 \
          --ccag-token "$$CCAG_TOKEN" \
          --ccag-host-token "$$CCAG_HOST_TOKEN" \
          --ccag-server-bin "$$CCAG_SERVER_BIN" \
          --opencode-router-bin "$$OPENCODE_ROUTER_BIN" \
          --approval auto \
          --allow-external \
          --cors "*"
    ports:
      - "${CCAG_PORT:-8787}:8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    environment:
      CI: "true"
      CCAG_TOKEN: ${CCAG_TOKEN:-}
      CCAG_HOST_TOKEN: ${CCAG_HOST_TOKEN:-}
      CCAG_DEV_ID: ${CCAG_DEV_ID:-default}
      CCAG_DEV_MODE: ${CCAG_DEV_MODE:-1}
      CCAG_PUBLISHER_BASE_URL: http://${CCAG_PUBLIC_HOST:-localhost}:${SHARE_PORT:-3006}
      CCAG_DEV_OPENCODE_IMPORT_CONFIG_DIR: /persist/.config/opencode
      CCAG_DEV_OPENCODE_IMPORT_DATA_DIR: /persist/.ccag-host-opencode-data
      CCAG_SIDECAR_SOURCE: external
 
  web:
    <<: *shared
    depends_on:
      orchestrator:
        condition: service_healthy
      share:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        # --- Install system deps ---
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates >/dev/null 2>&1

        # --- Bun + pnpm ---
        export BUN_INSTALL="/root/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        if ! command -v bun >/dev/null 2>&1; then
          curl -fsSL https://bun.sh/install | bash
        fi
        corepack enable && corepack prepare pnpm@10.27.0 --activate

        # --- Read token written by orchestrator ---
        if [ -f "/app/tmp/.dev-env-${CCAG_DEV_ID:-default}" ]; then
          . "/app/tmp/.dev-env-${CCAG_DEV_ID:-default}"
          export VITE_CCAG_TOKEN="$$CCAG_TOKEN"
        fi

        echo ""
        echo "============================================"
        echo "  CCAG web UI"
        echo "  URL:   http://localhost:${WEB_PORT:-5173}"
        echo "  Token: $${VITE_CCAG_TOKEN:-<see orchestrator logs>}"
        echo "============================================"
        echo ""

        export VITE_CCAG_URL="http://${CCAG_PUBLIC_HOST:-localhost}:${CCAG_PORT:-8787}"
        export VITE_CCAG_PORT="${CCAG_PORT:-8787}"
        export VITE_CCAG_PUBLISHER_BASE_URL="http://${CCAG_PUBLIC_HOST:-localhost}:${SHARE_PORT:-3006}"
        export VITE_ALLOWED_HOSTS="all"
        export HOST="0.0.0.0"
        export PORT="5173"

        exec pnpm --filter @ccag/app exec vite \
          --host 0.0.0.0 \
          --port 5173 \
          --strictPort
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      CCAG_DEV_ID: ${CCAG_DEV_ID:-default}

  share:
    <<: *shared
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates >/dev/null 2>&1

        corepack enable && corepack prepare pnpm@10.27.0 --activate

        echo "[share] Installing dependencies..."
        pnpm install --no-frozen-lockfile --network-concurrency 1 --child-concurrency 1

        mkdir -p /app/tmp/share-service-blobs

        echo "[share] Building Next app..."
        pnpm --dir apps/share build

        echo ""
        echo "============================================"
        echo "  CCAG share service"
        echo "  URL: http://localhost:${SHARE_PORT:-3006}"
        echo "============================================"
        echo ""

        exec pnpm --dir apps/share exec next start --hostname 0.0.0.0 --port 3000
    ports:
      - "${SHARE_PORT:-3006}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 180s
    environment:
      CI: "true"
      CCAG_DEV_MODE: ${CCAG_DEV_MODE:-1}
      LOCAL_BLOB_DIR: /app/tmp/share-service-blobs
      PUBLIC_BASE_URL: http://${CCAG_PUBLIC_HOST:-localhost}:${SHARE_PORT:-3006}
      PUBLIC_CCAG_APP_URL: http://${CCAG_PUBLIC_HOST:-localhost}:${WEB_PORT:-5173}

volumes:
  pnpm-store:
    name: ccag-dev-pnpm-store
  bun-install:
    name: ccag-dev-bun-install
