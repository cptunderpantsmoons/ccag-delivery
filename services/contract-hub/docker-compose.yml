# Contract Hub – Standalone Docker Compose (local dev only)
# For production, use docker-compose.yml in carbon-agent-platform/ instead.

version: '3.8'

services:
  # Main Application (Next.js)
  contract-hub:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://contracthub:${CONTRACT_HUB_POSTGRES_PASSWORD:-changeme}@postgres:5432/contracthub
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?error - set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?error - set CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
      - NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/dashboard
      - NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/dashboard
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID:-}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET:-}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-}
      - SHAREPOINT_SITE_ID=${SHAREPOINT_SITE_ID:-}
      - SHAREPOINT_LIBRARY_ID=${SHAREPOINT_LIBRARY_ID:-}
      - OPENCODE_SERVER_URL=${OPENCODE_SERVER_URL:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - DOCASSEMBLE_URL=${DOCASSEMBLE_URL:-}
      - DOCASSEMBLE_API_KEY=${DOCASSEMBLE_API_KEY:-}
      - CARBON_RAG_BASE_URL=${CARBON_RAG_BASE_URL:-http://orchestrator:8000}
      - NEXT_PUBLIC_APP_NAME=Contract Hub
      - NEXT_PUBLIC_APP_ORG=Corporate Carbon Group Australia
    depends_on:
      - postgres
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contracthub
      POSTGRES_USER: contracthub
      POSTGRES_PASSWORD: ${CONTRACT_HUB_POSTGRES_PASSWORD:-changeme}
    ports:
      - "${CONTRACT_HUB_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lib/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
